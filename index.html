<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Ping Pong Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Ping Pong Agent</h1>
            <div class="stats">
                <span>Player: <span id="playerScore">0</span></span>
                <span>AI Agent: <span id="aiScore">0</span></span>
            </div>
        </div>

        <div class="game-area">
            <canvas id="pongCanvas" width="800" height="400"></canvas>
            
            <div id="overlay" class="overlay">
                <h2 id="statusText">Ready to Play?</h2>
                <button onclick="startGame()">Start Mission</button>
            </div>
        </div>

        <div class="controls-panel">
           
            <button class="btn btn-danger" onclick="resetGame()">Reset System</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
